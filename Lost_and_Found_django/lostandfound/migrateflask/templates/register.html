{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - LostNoMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="{% static 'css/lostnomore.css' %}" rel="stylesheet"/>
</head>
<body class="lnm-gradient-bg">

  <!-- Navbar -->
  <nav class="lnm-navbar">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="lnm-brand" href="{% url 'index' %}">
        <span class="brand-lost">Lost</span><span class="brand-no">No</span><span class="brand-more">More</span>
      </a>
      <a href="{% url 'index' %}" class="btn-outline-light"><i class="fas fa-home me-1"></i> Home</a>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="auth-page" style="padding-top:5rem;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
          {% endif %}

          <div class="glass-card auth-card anim-scale-in" style="max-width:580px;">
            <div class="text-center mb-4">
              <div style="width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--success),#059669);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                <i class="fas fa-user-plus" style="font-size:1.3rem;color:#fff;"></i>
              </div>
              <h2>Create Account</h2>
              <p class="auth-subtitle">Join LostNoMore and start finding what matters</p>
            </div>
            <form action="{% url 'register' %}" method="POST">
              {% csrf_token %}
              <div class="lnm-input-group">
                <label class="lnm-form-label">Full Name</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-user"></i></span>
                  <input type="text" name="name" id="name" class="lnm-form-control" placeholder="Enter your full name" required value="{{ form_data.name|default:'' }}">
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Email Address</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-envelope"></i></span>
                  <input type="email" name="email" id="email" class="lnm-form-control" placeholder="Enter a valid email address" required value="{{ form_data.email|default:'' }}">
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Mobile Number</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-phone"></i></span>
                  <input type="text" name="phone" id="phone" class="lnm-form-control" placeholder="10-digit mobile number" required pattern="\d{10}" maxlength="10" title="Enter a 10-digit phone number" value="{{ form_data.phone|default:'' }}">
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Address</label>
                <div class="position-relative">
                  <span class="input-icon" style="top:1.2rem;"><i class="fas fa-map-marker-alt"></i></span>
                  <textarea name="address" id="address" rows="2" class="lnm-form-control" style="padding-left:2.75rem;" placeholder="Enter your current address" required>{{ form_data.address|default:'' }}</textarea>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="lnm-input-group">
                    <label class="lnm-form-label">Gender</label>
                    <div class="position-relative">
                      <span class="input-icon"><i class="fas fa-venus-mars"></i></span>
                      <select name="gender" id="gender" class="lnm-form-control" required>
                        <option value="" disabled hidden {% if not form_data.gender %}selected{% endif %}>Select gender</option>
                        <option value="Male" {% if form_data.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if form_data.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if form_data.gender == 'Other' %}selected{% endif %}>Other</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="lnm-input-group">
                    <label class="lnm-form-label">Date of Birth</label>
                    <div class="position-relative">
                      <span class="input-icon"><i class="fas fa-calendar-alt"></i></span>
                      <input type="date" name="dob" id="dob" class="lnm-form-control" required value="{{ form_data.dob|default:'' }}"/>
                    </div>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="lnm-input-group">
                    <label class="lnm-form-label">Password</label>
                    <div class="position-relative">
                      <span class="input-icon"><i class="fas fa-lock"></i></span>
                      <input type="password" name="password" id="password" class="lnm-form-control" placeholder="Create a password" required>
                      <button type="button" class="toggle-password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;">
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="lnm-input-group">
                    <label class="lnm-form-label">Confirm Password</label>
                    <div class="position-relative">
                      <span class="input-icon"><i class="fas fa-lock"></i></span>
                      <input type="password" name="cpassword" id="confirm_password" class="lnm-form-control" placeholder="Re-enter password" required>
                      <button type="button" class="toggle-password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;">
                        <i class="fas fa-eye"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn-success-glow w-100 justify-content-center mt-2" style="padding:0.85rem;">
                <i class="fas fa-user-plus"></i> Create Account
              </button>
            </form>
            <p class="text-center mt-4" style="color:var(--text-secondary);font-size:0.9rem;">
              Already registered? <a href="{% url 'login' %}" style="color:var(--primary-light);text-decoration:none;font-weight:600;">Sign in here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="lnm-footer">
    <div class="container text-center">
      <div class="footer-social mb-3">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <p>&copy; 2025 LostNoMore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'js/lostnomore.js' %}"></script>
</body>
</html>
