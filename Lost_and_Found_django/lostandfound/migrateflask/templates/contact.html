{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claim Item - LostNoMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="{% static 'css/lostnomore.css' %}" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="lnm-gradient-bg">

  <!-- Navbar -->
  <nav class="lnm-navbar">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="lnm-brand" href="{% url 'index' %}">
        <span class="brand-lost">Lost</span><span class="brand-no">No</span><span class="brand-more">More</span>
      </a>
      <a href="{% url 'dashboard' %}" class="btn-outline-light"><i class="fas fa-arrow-left me-1"></i> Dashboard</a>
    </div>
  </nav>

  <div class="container" style="padding-top:100px;padding-bottom:3rem;">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5 anim-scale-in">
          <div class="text-center mb-4">
            <div style="width:56px;height:56px;border-radius:12px;background:rgba(16,185,129,0.15);display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.75rem;">
              <i class="fas fa-hand-holding-heart" style="font-size:1.3rem;color:var(--success);"></i>
            </div>
            <h2 style="font-weight:800;">Claim a Lost Product</h2>
            <p style="color:var(--text-secondary);">Fill out the details below to submit your claim</p>
          </div>
          <form method="POST" enctype="multipart/form-data" onsubmit="handleFormSubmit(event)">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Your Name</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-user"></i></span>
                  <input type="text" name="name" required class="lnm-form-control" placeholder="Enter your name"/></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Email</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-envelope"></i></span>
                  <input type="email" name="email" required class="lnm-form-control" placeholder="Enter your email"/></div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Phone</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-phone"></i></span>
                  <input type="text" name="phone" required maxlength="10" class="lnm-form-control" placeholder="10-digit number"/></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Product Name</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-cube"></i></span>
                  <input type="text" name="product" required class="lnm-form-control" placeholder="Product you're claiming"/></div>
                </div>
              </div>
            </div>
            <div class="lnm-input-group">
              <label class="lnm-form-label">Description</label>
              <textarea name="description" required class="lnm-form-control" rows="3" style="padding-left:1rem;" placeholder="Describe the item and how you lost it"></textarea>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Date Lost</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-calendar-alt"></i></span>
                  <input type="date" name="date" required class="lnm-form-control"/></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Location</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-map-marker-alt"></i></span>
                  <input type="text" name="location" required class="lnm-form-control" placeholder="Where you lost it"/></div>
                </div>
              </div>
            </div>
            <div class="lnm-input-group">
              <label class="lnm-form-label">Proof Image</label>
              <input type="file" name="image" required class="lnm-form-control" style="padding-left:1rem;"/>
              <img class="img-preview mt-2" style="display:none;max-height:150px;border-radius:var(--radius-sm);"/>
            </div>
            <button type="submit" class="btn-success-glow w-100 justify-content-center mt-3" style="padding:0.85rem;">
              <i class="fas fa-paper-plane"></i> Submit Claim
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="lnm-footer">
    <div class="container text-center">
      <div class="footer-social mb-3">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <p>&copy; 2025 LostNoMore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'js/lostnomore.js' %}"></script>
  <script>
    function handleFormSubmit(e){
      e.preventDefault();
      var form=e.target;
      Swal.fire({
        title:'Submit Claim?',
        text:'Are you sure you want to submit this claim?',
        icon:'question',
        showCancelButton:true,
        confirmButtonColor:'var(--success)',
        cancelButtonColor:'var(--danger)',
        confirmButtonText:'Yes, Submit',
        background:'#1e293b',
        color:'#f1f5f9'
      }).then(function(result){
        if(result.isConfirmed){
          Swal.fire({
            title:'Claim Submitted!',
            text:'Your claim has been submitted successfully.',
            icon:'success',
            confirmButtonColor:'var(--primary)',
            background:'#1e293b',
            color:'#f1f5f9'
          }).then(function(){form.submit();});
        }
      });
    }
  </script>
</body>
</html>
