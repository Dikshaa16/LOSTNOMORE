{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile - LostNoMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="{% static 'css/lostnomore.css' %}" rel="stylesheet"/>
</head>
<body class="lnm-gradient-bg">

  <!-- Navbar -->
  <nav class="lnm-navbar">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="lnm-brand" href="{% url 'index' %}">
        <span class="brand-lost">Lost</span><span class="brand-no">No</span><span class="brand-more">More</span>
      </a>
      <a href="{% url 'profile' %}" class="btn-outline-light"><i class="fas fa-arrow-left me-1"></i> Back to Profile</a>
    </div>
  </nav>

  <section class="auth-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          {% if messages %}
          {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
          {% endif %}

          <div class="glass-card auth-card anim-scale-in" style="max-width:480px;">
            <div class="text-center mb-4">
              <div style="width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#d97706);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
                <i class="fas fa-user-edit" style="font-size:1.3rem;color:#0f172a;"></i>
              </div>
              <h2>Edit Profile</h2>
              <p class="auth-subtitle">Update your personal information</p>
            </div>
            <form action="{% url 'edit_profile' %}" method="POST">
              {% csrf_token %}
              <div class="lnm-input-group">
                <label class="lnm-form-label">Name</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-user"></i></span>
                  <input type="text" name="name" id="name" class="lnm-form-control" value="{{ user.name }}" required>
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Email</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-envelope"></i></span>
                  <input type="email" name="email" id="email" class="lnm-form-control" value="{{ user.email }}" required>
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Mobile</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-phone"></i></span>
                  <input type="text" name="phone" id="phone" class="lnm-form-control" value="{{ user.phone }}" required>
                </div>
              </div>
              <div class="lnm-input-group">
                <label class="lnm-form-label">Role</label>
                <div class="position-relative">
                  <span class="input-icon"><i class="fas fa-user-tag"></i></span>
                  <input type="text" name="role" id="role" class="lnm-form-control" value="{{ role }}" readonly style="opacity:0.7;cursor:not-allowed;">
                </div>
              </div>
              <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn-primary-glow justify-content-center" style="padding:0.85rem;">
                  <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{% url 'profile' %}" class="btn-outline-light justify-content-center" style="padding:0.75rem;">
                  <i class="fas fa-times"></i> Cancel
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="lnm-footer">
    <div class="container text-center">
      <div class="footer-social mb-3">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <p>&copy; 2025 LostNoMore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'js/lostnomore.js' %}"></script>
</body>
</html>
