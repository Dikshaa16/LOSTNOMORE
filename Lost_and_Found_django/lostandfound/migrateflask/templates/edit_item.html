{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Item - LostNoMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="{% static 'css/lostnomore.css' %}" rel="stylesheet"/>
</head>
<body class="lnm-gradient-bg">

  <!-- Navbar -->
  <nav class="lnm-navbar">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="lnm-brand" href="{% url 'index' %}">
        <span class="brand-lost">Lost</span><span class="brand-no">No</span><span class="brand-more">More</span>
      </a>
      <a href="{% url 'gallery' %}" class="btn-outline-light"><i class="fas fa-arrow-left me-1"></i> Back to Gallery</a>
    </div>
  </nav>

  <div class="container" style="padding-top:100px;padding-bottom:3rem;">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="glass-card p-4 p-md-5 anim-scale-in">
          <div class="text-center mb-4">
            <div style="width:56px;height:56px;border-radius:12px;background:rgba(245,158,11,0.15);display:inline-flex;align-items:center;justify-content:center;margin-bottom:0.75rem;">
              <i class="fas fa-edit" style="font-size:1.3rem;color:var(--accent-light);"></i>
            </div>
            <h2 style="font-weight:800;">Edit Item</h2>
            <p style="color:var(--text-secondary);">Update the details of this item</p>
          </div>
          <form enctype="multipart/form-data" method="POST" onsubmit="confirmEdit(event)">
            {% csrf_token %}
            <div class="row">
              <div class="col-md-6">
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Item Name</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-tag"></i></span>
                  <input type="text" name="item_name" value="{{ item.name }}" required class="lnm-form-control" placeholder="Enter item name"/></div>
                </div>
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Description</label>
                  <textarea name="description" required class="lnm-form-control" rows="3" style="padding-left:1rem;" placeholder="Enter description">{{ item.description }}</textarea>
                </div>
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Category</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-layer-group"></i></span>
                  <select name="category" required class="lnm-form-control">
                    <option value="electronics" {% if item.category == 'electronics' %}selected{% endif %}>Electronics</option>
                    <option value="clothing" {% if item.category == 'clothing' %}selected{% endif %}>Clothing</option>
                    <option value="accessories" {% if item.category == 'accessories' %}selected{% endif %}>Accessories</option>
                    <option value="jewelry" {% if item.category == 'jewelry' %}selected{% endif %}>Jewelry</option>
                    <option value="documents" {% if item.category == 'documents' %}selected{% endif %}>Documents</option>
                    <option value="pets" {% if item.category == 'pets' %}selected{% endif %}>Pets</option>
                    <option value="toys" {% if item.category == 'toys' %}selected{% endif %}>Toys</option>
                    <option value="tools" {% if item.category == 'tools' %}selected{% endif %}>Tools</option>
                    <option value="sports" {% if item.category == 'sports' %}selected{% endif %}>Sports Equipment</option>
                    <option value="others" {% if item.category == 'others' %}selected{% endif %}>Others</option>
                  </select></div>
                </div>
                <div class="row">
                  <div class="col-6">
                    <div class="lnm-input-group">
                      <label class="lnm-form-label">Date</label>
                      <div class="position-relative"><span class="input-icon"><i class="fas fa-calendar-alt"></i></span>
                      <input type="date" name="date" value="{{ item.date }}" required class="lnm-form-control"/></div>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="lnm-input-group">
                      <label class="lnm-form-label">Status</label>
                      <div class="position-relative"><span class="input-icon"><i class="fas fa-info-circle"></i></span>
                      <select name="status" required class="lnm-form-control">
                        <option value="lost" {% if item.status == 'lost' %}selected{% endif %}>Lost</option>
                        <option value="found" {% if item.status == 'found' %}selected{% endif %}>Found</option>
                        <option value="returned" {% if item.status == 'returned' %}selected{% endif %}>Returned</option>
                      </select></div>
                    </div>
                  </div>
                </div>
                <div class="lnm-input-group">
                  <label class="lnm-form-label">Location</label>
                  <div class="position-relative"><span class="input-icon"><i class="fas fa-map-marker-alt"></i></span>
                  <input type="text" name="location" value="{{ item.location }}" required class="lnm-form-control" placeholder="Enter location"/></div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="lnm-form-label">Current Image</label>
                  <div class="text-center" style="background:var(--dark-surface);border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-color);">
                    <img src="{{ item.image.url }}" alt="Item Image" style="width:100%;max-height:280px;object-fit:cover;"/>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="lnm-form-label">Upload New Image <span style="font-weight:400;text-transform:none;">(leave blank if no change)</span></label>
                  <input type="file" name="image" class="lnm-form-control" style="padding-left:1rem;"/>
                  <img class="img-preview mt-2" style="display:none;max-height:150px;border-radius:var(--radius-sm);"/>
                </div>
                <button type="submit" class="btn-accent-glow w-100 justify-content-center mt-3" style="padding:0.85rem;">
                  <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{% url 'gallery' %}" class="btn-outline-light w-100 justify-content-center mt-2" style="padding:0.75rem;">
                  <i class="fas fa-times"></i> Cancel
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="lnm-footer">
    <div class="container text-center">
      <div class="footer-social mb-3">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <p>&copy; 2025 LostNoMore. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{% static 'js/lostnomore.js' %}"></script>
  <script>
    var formToSubmit;
    function confirmEdit(e){
      e.preventDefault();formToSubmit=e.target;
      var overlay=document.createElement('div');overlay.className='lnm-alert-overlay';
      overlay.innerHTML='<div class="lnm-alert-box"><h4 style="font-weight:700;margin-bottom:0.75rem;">Confirm Changes</h4><p style="color:var(--text-secondary);margin-bottom:1.5rem;">Are you sure you want to save these changes?</p><div class="d-flex gap-2 justify-content-center"><button class="btn-primary-glow" onclick="proceedEdit()">Yes, Save</button><button class="btn-outline-light" onclick="cancelEdit()">Cancel</button></div></div>';
      document.body.appendChild(overlay);
    }
    function proceedEdit(){if(formToSubmit)formToSubmit.submit();}
    function cancelEdit(){var o=document.querySelector('.lnm-alert-overlay');if(o)o.remove();}
  </script>
</body>
</html>
