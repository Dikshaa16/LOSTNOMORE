services:
  - type: web
    name: lostnomore
    env: python
    region: oregon
    buildCommand: "cd LostNoMore_flask && pip install -r requirements.txt"
    startCommand: "cd LostNoMore_flask && gunicorn --bind 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: lostnomore-data
      mountPath: /opt/render/project/src/LostNoMore_flask
      sizeGB: 1
